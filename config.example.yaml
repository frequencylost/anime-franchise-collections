# anime-franchise-collections — optional override config.
#
# Save this as config.yaml inside the volume mounted to /config.
# All entries here are optional — if you don't need to override anything,
# you don't need a config file at all.

# ----- Collection name overrides -----
# Override the auto-generated collection name for specific franchises.
# Match either by parent AniList ID (the lowest AniList ID in the cluster,
# usually Season 1's ID) or by the auto-generated title text.
overrides:
  # Group all of A Certain Magical Index / Railgun / Accelerator together
  # under "Academy City Collection" instead of "A Certain Magical Index".
  - parent_anilist_id: 4654
    name: "Academy City Collection"

  # Use a synonym/short name. match_title is matched case-insensitively
  # against the auto-detected English title.
  - match_title: "Is It Wrong to Try to Pick Up Girls in a Dungeon?"
    name: "Danmachi"

# ----- Cluster fixing -----
# AniList's relation graph occasionally bridges unrelated franchises
# through a single offending entry — usually a compilation, anthology,
# or crossover special. To find the bridge, open the cluster report at
# /config/logs/clusters_report.json after a run and look for an unexpected
# title in the cluster's "members" list. Add that AniList ID below to
# break the bridge on the next run.
blocklist_anilist_ids:
  # - 12345   # "Some Mecha Anthology" that bridges Eva and Gundam

# Drop additional relation types beyond the always-dropped ones
# (ADAPTATION, SOURCE, CHARACTER are always dropped).
# Common useful additions for the cross-franchise leak problem:
#   COMPILATION  - bundled collections / "movie 1+2+3" entries
#   CONTAINS     - inverse of COMPILATION
#   OTHER        - catch-all that's frequently noisy
# These are kept by default because they're sometimes legitimately
# franchise-internal; turn them off if you keep getting bridge problems.
extra_dropped_relation_types:
  # - COMPILATION
  # - CONTAINS
  # - OTHER

# ----- Per-Plex-item fixes -----
# Sometimes the upstream PlexAniBridge mapping data has a wrong
# AniList <-> TMDB/TVDB ID match. The symptom is a Plex item ending up
# in a cluster it has nothing to do with. Look at the cluster report's
# "plex_items" list — if you spot a title that doesn't belong, copy its
# rating_key from the report and either skip it or remap it.

# Skip specific Plex items entirely. Find rating_keys in clusters_report.json.
plex_item_blocklist:
  # - "84589"   # e.g. Bleach the Movie 3 (mapping bug placed it in Clannad)

# Force a specific Plex item to a known AniList ID, overriding whatever
# the PlexAniBridge mapping resolved it to. The AniList ID is the
# numeric ID in the AniList URL (e.g. /anime/4147/ -> 4147).
mapping_overrides:
  # - rating_key: "84589"
  #   anilist_id: 4147   # Bleach the Movie 3's actual AniList entry

# ----- Notes -----
# Tip: you can also rename a collection directly in Plex. The script
# tracks the last-applied name per cluster (in /config/cache/state.json)
# and detects when most cluster items share a different collection name —
# at which point it adopts the new name automatically. No config edits
# needed for that workflow.
